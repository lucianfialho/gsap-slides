<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gsap-slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* ========================================================
         gsap-slides — Editorial Cinema + SVG Storytelling
         ======================================================== */

      :root {
        --gs-bg: #0a0a0f;
        --gs-surface: #111118;
        --gs-text: #f0eff4;
        --gs-text-muted: rgba(240, 239, 244, 0.45);
        --gs-text-dim: rgba(240, 239, 244, 0.25);
        --gs-accent: #7c6aef;
        --gs-accent-2: #a78bfa;
        --gs-accent-3: #6ee7b7;
        --gs-accent-glow: rgba(124, 106, 239, 0.35);
        --gs-border: rgba(255, 255, 255, 0.06);
        --gs-code-bg: #15151e;
        --gs-font-display: 'Outfit', system-ui, -apple-system, sans-serif;
        --gs-font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
        --gs-slide-max-w: 1100px;
        --gs-radius: 12px;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--gs-font-display);
        background: var(--gs-bg);
        color: var(--gs-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* ========================================================
         Background Layer — ambient glow orbs
         ======================================================== */
      #gs-bg-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .gs-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0;
        will-change: transform, opacity;
      }
      .gs-orb--1 {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(124, 106, 239, 0.15), transparent 70%);
        top: -10%; left: -5%;
      }
      .gs-orb--2 {
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(110, 231, 183, 0.1), transparent 70%);
        bottom: -10%; right: -5%;
      }
      .gs-orb--3 {
        width: 300px; height: 300px;
        background: radial-gradient(circle, rgba(167, 139, 250, 0.12), transparent 70%);
        top: 40%; right: 20%;
      }

      /* ========================================================
         SVG Navigation Spine — vertical line + dots on the right
         ======================================================== */
      #gs-nav-spine {
        position: fixed;
        right: 2.5rem;
        top: 50%;
        transform: translateY(-50%);
        z-index: 150;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        pointer-events: none;
      }

      #gs-nav-spine svg {
        overflow: visible;
      }

      .gs-spine-dot {
        cursor: pointer;
        pointer-events: all;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .gs-spine-dot:hover {
        transform: scale(1.5);
      }
      .gs-spine-dot circle {
        transition: fill 0.3s ease, r 0.3s ease;
      }

      .gs-spine-line {
        stroke: rgba(124, 106, 239, 0.15);
        stroke-width: 1;
        fill: none;
      }

      .gs-spine-progress {
        stroke: var(--gs-accent);
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        filter: drop-shadow(0 0 6px var(--gs-accent-glow));
      }

      /* ========================================================
         Floating SVG Geometries
         ======================================================== */
      #gs-geo-layer {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }

      .gs-geo {
        position: absolute;
        opacity: 0;
        will-change: transform, opacity;
      }

      .gs-geo svg {
        width: 100%;
        height: 100%;
      }

      .gs-geo--tri {
        width: 60px; height: 60px;
        top: 15%; left: 8%;
      }
      .gs-geo--circle {
        width: 40px; height: 40px;
        top: 70%; left: 5%;
      }
      .gs-geo--diamond {
        width: 50px; height: 50px;
        top: 25%; right: 12%;
      }
      .gs-geo--cross {
        width: 35px; height: 35px;
        bottom: 20%; right: 8%;
      }
      .gs-geo--ring {
        width: 70px; height: 70px;
        bottom: 30%; left: 12%;
      }
      .gs-geo--dots {
        width: 80px; height: 80px;
        top: 60%; right: 15%;
      }

      /* ========================================================
         Slide Number — large ghosted number
         ======================================================== */
      #gs-slide-number {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--gs-font-display);
        font-size: 12rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.02);
        z-index: 0;
        pointer-events: none;
        line-height: 1;
        letter-spacing: -0.05em;
        transition: none;
      }

      /* ========================================================
         Slide Container
         ======================================================== */
      #slides-container {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
      }

      /* ---- Individual Slides ---- */
      .gsap-slide {
        font-size: 1rem;
        text-align: left;
        flex-direction: column;
        gap: 0;
        overflow: hidden;
      }

      .gsap-slide > * {
        max-width: var(--gs-slide-max-w);
        width: 100%;
      }

      /* ---- Typography ---- */
      .gsap-slide h1 {
        font-family: var(--gs-font-display);
        font-size: clamp(2.8rem, 5.5vw, 5rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.035em;
        margin-bottom: 0.5em;
        background: linear-gradient(135deg, var(--gs-text) 0%, rgba(240, 239, 244, 0.7) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .gsap-slide h2 {
        font-family: var(--gs-font-display);
        font-size: clamp(2rem, 3.5vw, 3.2rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.025em;
        margin-bottom: 0.6em;
        color: var(--gs-text);
      }

      .gsap-slide h3 {
        font-family: var(--gs-font-display);
        font-size: clamp(1.4rem, 2.2vw, 2rem);
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: -0.015em;
        margin-bottom: 0.5em;
        color: var(--gs-text);
      }

      .gsap-slide p {
        font-size: clamp(1.1rem, 1.6vw, 1.45rem);
        line-height: 1.65;
        font-weight: 300;
        color: rgba(240, 239, 244, 0.78);
        margin-bottom: 0.8em;
        max-width: 48em;
      }

      .gsap-slide strong {
        font-weight: 600;
        color: var(--gs-text);
      }

      .gsap-slide em {
        font-style: italic;
        color: rgba(240, 239, 244, 0.9);
      }

      /* ---- Links ---- */
      .gsap-slide a {
        color: var(--gs-accent);
        text-decoration: none;
        border-bottom: 1px solid var(--gs-accent-glow);
        transition: border-color 0.2s ease;
      }
      .gsap-slide a:hover {
        border-bottom-color: var(--gs-accent);
      }

      /* ---- Lists ---- */
      .gsap-slide ul, .gsap-slide ol {
        list-style: none;
        padding: 0;
        margin-bottom: 0.8em;
      }

      .gsap-slide ul li, .gsap-slide ol li {
        font-size: clamp(1.05rem, 1.5vw, 1.35rem);
        line-height: 1.6;
        font-weight: 400;
        color: rgba(240, 239, 244, 0.82);
        padding: 0.35em 0 0.35em 1.8em;
        position: relative;
      }

      .gsap-slide ul li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.85em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gs-accent);
        box-shadow: 0 0 8px var(--gs-accent-glow);
      }

      .gsap-slide ol { counter-reset: slide-ol; }
      .gsap-slide ol li { counter-increment: slide-ol; }
      .gsap-slide ol li::before {
        content: counter(slide-ol);
        position: absolute;
        left: 0;
        top: 0.35em;
        font-family: var(--gs-font-mono);
        font-size: 0.75em;
        font-weight: 500;
        color: var(--gs-accent);
        width: 1.4em;
        text-align: center;
      }

      /* ---- Inline Code ---- */
      .gsap-slide code {
        font-family: var(--gs-font-mono);
        font-size: 0.88em;
        font-weight: 400;
        background: var(--gs-code-bg);
        color: #c4b5fd;
        padding: 0.15em 0.45em;
        border-radius: 5px;
        border: 1px solid var(--gs-border);
      }

      /* ---- Code Blocks (Shiki) ---- */
      .gsap-slide pre {
        margin: 1em 0;
        border-radius: var(--gs-radius);
        overflow: hidden;
        border: 1px solid var(--gs-border);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      }

      .gsap-slide pre code {
        display: block;
        padding: 1.4em 1.6em;
        font-size: clamp(0.85rem, 1.1vw, 1.05rem);
        line-height: 1.7;
        background: var(--gs-code-bg) !important;
        border: none;
        border-radius: 0;
        overflow-x: auto;
      }

      .gsap-slide .shiki {
        margin: 1em 0;
        border-radius: var(--gs-radius);
        border: 1px solid var(--gs-border);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        overflow: hidden;
      }

      .gsap-slide .shiki code {
        display: block;
        padding: 1.4em 1.6em;
        font-size: clamp(0.85rem, 1.1vw, 1.05rem);
        line-height: 1.7;
        background: transparent !important;
        border: none;
        border-radius: 0;
      }

      /* ---- Tables ---- */
      .gsap-slide table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        font-size: clamp(0.95rem, 1.2vw, 1.15rem);
      }

      .gsap-slide th {
        text-align: left;
        font-weight: 600;
        font-size: 0.8em;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gs-text-muted);
        padding: 0.8em 1em;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .gsap-slide td {
        padding: 0.7em 1em;
        color: rgba(240, 239, 244, 0.78);
        border-bottom: 1px solid var(--gs-border);
      }

      .gsap-slide tr:last-child td { border-bottom: none; }

      /* ---- Blockquotes ---- */
      .gsap-slide blockquote {
        border-left: 3px solid var(--gs-accent);
        padding: 0.6em 1.2em;
        margin: 1em 0;
        background: rgba(124, 106, 239, 0.05);
        border-radius: 0 var(--gs-radius) var(--gs-radius) 0;
      }

      .gsap-slide blockquote p {
        font-style: italic;
        color: rgba(240, 239, 244, 0.7);
      }

      .gsap-slide hr {
        border: none;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gs-border), transparent);
        margin: 1.5em 0;
      }

      .gsap-slide img {
        max-width: 100%;
        height: auto;
        border-radius: var(--gs-radius);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      /* ========================================================
         Overlay Controls
         ======================================================== */
      #slide-counter {
        position: fixed;
        bottom: 1.4rem;
        right: 1.6rem;
        font-family: var(--gs-font-mono);
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--gs-text-dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        z-index: 100;
        transition: color 0.3s ease;
      }
      #slide-counter:hover { color: var(--gs-text-muted); }

      #progress-bar-wrap {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: transparent;
        z-index: 100;
      }
      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--gs-accent), var(--gs-accent-2));
        box-shadow: 0 0 12px var(--gs-accent-glow);
        transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        border-radius: 0 1px 1px 0;
      }

      #slide-timer {
        position: fixed;
        bottom: 1.4rem;
        left: 1.6rem;
        font-family: var(--gs-font-mono);
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--gs-text-dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        z-index: 100;
        transition: color 0.3s ease;
      }
      #slide-timer:hover { color: var(--gs-text-muted); }

      /* ========================================================
         Presenter Mode
         ======================================================== */
      body.presenter-mode #slides-container { width: 62%; height: 100%; }
      body.presenter-mode #gs-nav-spine { display: none; }

      #presenter-panel {
        position: fixed;
        top: 0; right: 0;
        width: 38%; height: 100%;
        background: var(--gs-surface);
        border-left: 1px solid var(--gs-border);
        display: flex;
        flex-direction: column;
        z-index: 200;
      }

      #next-slide-preview { flex: 1; padding: 1.5rem 1.8rem; border-bottom: 1px solid var(--gs-border); overflow: auto; }
      #next-slide-preview h3, #presenter-notes h3 {
        font-family: var(--gs-font-mono);
        font-size: 0.65rem; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.15em;
        color: var(--gs-text-dim); margin-bottom: 1rem;
      }
      .preview-content { font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; color: var(--gs-text-muted); }
      #presenter-notes { flex: 1; padding: 1.5rem 1.8rem; overflow: auto; }
      .notes-content { font-size: 0.95rem; line-height: 1.7; font-weight: 300; color: rgba(240, 239, 244, 0.75); white-space: pre-wrap; }

      /* ========================================================
         Responsive
         ======================================================== */
      @media (max-width: 768px) {
        .gsap-slide h1 { font-size: 2.2rem; }
        .gsap-slide h2 { font-size: 1.6rem; }
        .gsap-slide p, .gsap-slide ul li, .gsap-slide ol li { font-size: 1rem; }
        .gsap-slide pre code, .gsap-slide .shiki code { font-size: 0.8rem; padding: 1em; }
        #gs-nav-spine { display: none; }
        #gs-geo-layer { display: none; }
        #gs-slide-number { font-size: 6rem; }
        body.presenter-mode #slides-container { width: 100%; }
        #presenter-panel { display: none; }
      }

      .gsap-slide pre::-webkit-scrollbar { height: 4px; }
      .gsap-slide pre::-webkit-scrollbar-track { background: transparent; }
      .gsap-slide pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
  </head>
  <body>
    <!-- Background ambient glow orbs -->
    <div id="gs-bg-layer">
      <div class="gs-orb gs-orb--1"></div>
      <div class="gs-orb gs-orb--2"></div>
      <div class="gs-orb gs-orb--3"></div>
    </div>

    <!-- Floating SVG geometries -->
    <div id="gs-geo-layer">
      <div class="gs-geo gs-geo--tri">
        <svg viewBox="0 0 60 60"><polygon points="30,5 55,55 5,55" fill="none" stroke="rgba(124,106,239,0.3)" stroke-width="1.5"/></svg>
      </div>
      <div class="gs-geo gs-geo--circle">
        <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="rgba(110,231,183,0.25)" stroke-width="1.5"/></svg>
      </div>
      <div class="gs-geo gs-geo--diamond">
        <svg viewBox="0 0 50 50"><rect x="10" y="10" width="30" height="30" fill="none" stroke="rgba(167,139,250,0.25)" stroke-width="1.5" transform="rotate(45 25 25)"/></svg>
      </div>
      <div class="gs-geo gs-geo--cross">
        <svg viewBox="0 0 35 35"><line x1="17.5" y1="5" x2="17.5" y2="30" stroke="rgba(124,106,239,0.2)" stroke-width="1.5"/><line x1="5" y1="17.5" x2="30" y2="17.5" stroke="rgba(124,106,239,0.2)" stroke-width="1.5"/></svg>
      </div>
      <div class="gs-geo gs-geo--ring">
        <svg viewBox="0 0 70 70"><circle cx="35" cy="35" r="30" fill="none" stroke="rgba(110,231,183,0.15)" stroke-width="1" stroke-dasharray="4 6"/></svg>
      </div>
      <div class="gs-geo gs-geo--dots">
        <svg viewBox="0 0 80 80">
          <circle cx="10" cy="10" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="30" cy="10" r="2" fill="rgba(167,139,250,0.2)"/>
          <circle cx="50" cy="10" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="70" cy="10" r="2" fill="rgba(167,139,250,0.2)"/>
          <circle cx="10" cy="30" r="2" fill="rgba(167,139,250,0.2)"/>
          <circle cx="30" cy="30" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="50" cy="30" r="2" fill="rgba(167,139,250,0.2)"/>
          <circle cx="70" cy="30" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="10" cy="50" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="30" cy="50" r="2" fill="rgba(167,139,250,0.2)"/>
          <circle cx="50" cy="50" r="2" fill="rgba(167,139,250,0.3)"/>
          <circle cx="70" cy="50" r="2" fill="rgba(167,139,250,0.2)"/>
        </svg>
      </div>
    </div>

    <!-- Giant ghost slide number -->
    <div id="gs-slide-number">1</div>

    <!-- Navigation spine (built dynamically in JS) -->
    <nav id="gs-nav-spine"></nav>

    <!-- Slides -->
    <div id="slides-container"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
