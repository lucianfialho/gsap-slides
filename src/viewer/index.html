<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gsap-slides</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }

      /* ---- Slide container ---- */
      #slides-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .gsap-slide {
        padding: 2rem;
        font-size: 2rem;
        text-align: center;
        flex-direction: column;
        gap: 1rem;
      }
      .gsap-slide h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      /* ---- Slide counter ---- */
      #slide-counter {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.6);
        font-variant-numeric: tabular-nums;
        z-index: 100;
      }

      /* ---- Progress bar ---- */
      #progress-bar-wrap {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: rgba(255,255,255,0.15);
        z-index: 100;
      }
      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: #6c63ff;
        transition: width 0.3s ease;
      }

      /* ---- Timer ---- */
      #slide-timer {
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.6);
        font-variant-numeric: tabular-nums;
        z-index: 100;
      }

      /* ---- Presenter mode ---- */
      body.presenter-mode #slides-container {
        width: 60%;
        height: 100%;
      }
      #presenter-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 40%;
        height: 100%;
        background: #12121f;
        border-left: 1px solid rgba(255,255,255,0.1);
        display: flex;
        flex-direction: column;
        z-index: 200;
      }
      #next-slide-preview {
        flex: 1;
        padding: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        overflow: auto;
      }
      #next-slide-preview h3,
      #presenter-notes h3 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: rgba(255,255,255,0.5);
        margin-bottom: 0.5rem;
      }
      .preview-content {
        font-size: 0.9rem;
        white-space: pre-wrap;
        color: rgba(255,255,255,0.7);
      }
      #presenter-notes {
        flex: 1;
        padding: 1rem;
        overflow: auto;
      }
      .notes-content {
        font-size: 0.95rem;
        line-height: 1.6;
        color: rgba(255,255,255,0.85);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="slides-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
