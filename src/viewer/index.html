<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gsap-slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* ========================================================
         gsap-slides — Editorial Cinema Theme
         ======================================================== */

      :root {
        --gs-bg: #0a0a0f;
        --gs-surface: #111118;
        --gs-text: #f0eff4;
        --gs-text-muted: rgba(240, 239, 244, 0.45);
        --gs-text-dim: rgba(240, 239, 244, 0.25);
        --gs-accent: #7c6aef;
        --gs-accent-glow: rgba(124, 106, 239, 0.35);
        --gs-border: rgba(255, 255, 255, 0.06);
        --gs-code-bg: #15151e;
        --gs-font-display: 'Outfit', system-ui, -apple-system, sans-serif;
        --gs-font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
        --gs-slide-max-w: 1100px;
        --gs-radius: 12px;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--gs-font-display);
        background: var(--gs-bg);
        color: var(--gs-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* Subtle noise texture on body */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
        background-repeat: repeat;
        pointer-events: none;
        z-index: 0;
      }

      /* ---- Slide Container ---- */
      #slides-container {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* ---- Individual Slides ---- */
      .gsap-slide {
        font-size: 1rem;
        text-align: left;
        flex-direction: column;
        gap: 0;
        overflow: hidden;
      }

      /* Inner content wrapper for max-width control */
      .gsap-slide > * {
        max-width: var(--gs-slide-max-w);
        width: 100%;
      }

      /* ---- Typography ---- */
      .gsap-slide h1 {
        font-family: var(--gs-font-display);
        font-size: clamp(2.8rem, 5.5vw, 5rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.035em;
        margin-bottom: 0.5em;
        background: linear-gradient(135deg, var(--gs-text) 0%, rgba(240, 239, 244, 0.7) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .gsap-slide h2 {
        font-family: var(--gs-font-display);
        font-size: clamp(2rem, 3.5vw, 3.2rem);
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -0.025em;
        margin-bottom: 0.6em;
        color: var(--gs-text);
      }

      .gsap-slide h3 {
        font-family: var(--gs-font-display);
        font-size: clamp(1.4rem, 2.2vw, 2rem);
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: -0.015em;
        margin-bottom: 0.5em;
        color: var(--gs-text);
      }

      .gsap-slide p {
        font-size: clamp(1.1rem, 1.6vw, 1.45rem);
        line-height: 1.65;
        font-weight: 300;
        color: rgba(240, 239, 244, 0.78);
        margin-bottom: 0.8em;
        max-width: 48em;
      }

      .gsap-slide strong {
        font-weight: 600;
        color: var(--gs-text);
      }

      .gsap-slide em {
        font-style: italic;
        color: rgba(240, 239, 244, 0.9);
      }

      /* ---- Links ---- */
      .gsap-slide a {
        color: var(--gs-accent);
        text-decoration: none;
        border-bottom: 1px solid var(--gs-accent-glow);
        transition: border-color 0.2s ease;
      }
      .gsap-slide a:hover {
        border-bottom-color: var(--gs-accent);
      }

      /* ---- Lists ---- */
      .gsap-slide ul,
      .gsap-slide ol {
        list-style: none;
        padding: 0;
        margin-bottom: 0.8em;
      }

      .gsap-slide ul li,
      .gsap-slide ol li {
        font-size: clamp(1.05rem, 1.5vw, 1.35rem);
        line-height: 1.6;
        font-weight: 400;
        color: rgba(240, 239, 244, 0.82);
        padding: 0.35em 0 0.35em 1.8em;
        position: relative;
      }

      .gsap-slide ul li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.85em;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gs-accent);
        box-shadow: 0 0 8px var(--gs-accent-glow);
      }

      .gsap-slide ol {
        counter-reset: slide-ol;
      }
      .gsap-slide ol li {
        counter-increment: slide-ol;
      }
      .gsap-slide ol li::before {
        content: counter(slide-ol);
        position: absolute;
        left: 0;
        top: 0.35em;
        font-family: var(--gs-font-mono);
        font-size: 0.75em;
        font-weight: 500;
        color: var(--gs-accent);
        width: 1.4em;
        text-align: center;
      }

      /* ---- Inline Code ---- */
      .gsap-slide code {
        font-family: var(--gs-font-mono);
        font-size: 0.88em;
        font-weight: 400;
        background: var(--gs-code-bg);
        color: #c4b5fd;
        padding: 0.15em 0.45em;
        border-radius: 5px;
        border: 1px solid var(--gs-border);
      }

      /* ---- Code Blocks (Shiki) ---- */
      .gsap-slide pre {
        margin: 1em 0;
        border-radius: var(--gs-radius);
        overflow: hidden;
        border: 1px solid var(--gs-border);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      }

      .gsap-slide pre code {
        display: block;
        padding: 1.4em 1.6em;
        font-size: clamp(0.85rem, 1.1vw, 1.05rem);
        line-height: 1.7;
        background: var(--gs-code-bg) !important;
        border: none;
        border-radius: 0;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Shiki themed blocks */
      .gsap-slide .shiki {
        margin: 1em 0;
        border-radius: var(--gs-radius);
        border: 1px solid var(--gs-border);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        overflow: hidden;
      }

      .gsap-slide .shiki code {
        display: block;
        padding: 1.4em 1.6em;
        font-size: clamp(0.85rem, 1.1vw, 1.05rem);
        line-height: 1.7;
        background: transparent !important;
        border: none;
        border-radius: 0;
      }

      /* ---- Tables ---- */
      .gsap-slide table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        font-size: clamp(0.95rem, 1.2vw, 1.15rem);
      }

      .gsap-slide th {
        text-align: left;
        font-weight: 600;
        font-size: 0.8em;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gs-text-muted);
        padding: 0.8em 1em;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .gsap-slide td {
        padding: 0.7em 1em;
        color: rgba(240, 239, 244, 0.78);
        border-bottom: 1px solid var(--gs-border);
      }

      .gsap-slide tr:last-child td {
        border-bottom: none;
      }

      /* ---- Blockquotes ---- */
      .gsap-slide blockquote {
        border-left: 3px solid var(--gs-accent);
        padding: 0.6em 1.2em;
        margin: 1em 0;
        background: rgba(124, 106, 239, 0.05);
        border-radius: 0 var(--gs-radius) var(--gs-radius) 0;
      }

      .gsap-slide blockquote p {
        font-style: italic;
        color: rgba(240, 239, 244, 0.7);
      }

      /* ---- Horizontal Rules ---- */
      .gsap-slide hr {
        border: none;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gs-border), transparent);
        margin: 1.5em 0;
      }

      /* ---- Images ---- */
      .gsap-slide img {
        max-width: 100%;
        height: auto;
        border-radius: var(--gs-radius);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      /* ========================================================
         Overlay Controls
         ======================================================== */

      /* ---- Slide Counter ---- */
      #slide-counter {
        position: fixed;
        bottom: 1.4rem;
        right: 1.6rem;
        font-family: var(--gs-font-mono);
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--gs-text-dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        z-index: 100;
        transition: color 0.3s ease;
      }
      #slide-counter:hover {
        color: var(--gs-text-muted);
      }

      /* ---- Progress Bar ---- */
      #progress-bar-wrap {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: transparent;
        z-index: 100;
      }
      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--gs-accent), #a78bfa);
        box-shadow: 0 0 12px var(--gs-accent-glow);
        transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        border-radius: 0 1px 1px 0;
      }

      /* ---- Timer ---- */
      #slide-timer {
        position: fixed;
        bottom: 1.4rem;
        left: 1.6rem;
        font-family: var(--gs-font-mono);
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--gs-text-dim);
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
        z-index: 100;
        transition: color 0.3s ease;
      }
      #slide-timer:hover {
        color: var(--gs-text-muted);
      }

      /* ========================================================
         Presenter Mode
         ======================================================== */

      body.presenter-mode #slides-container {
        width: 62%;
        height: 100%;
      }

      #presenter-panel {
        position: fixed;
        top: 0;
        right: 0;
        width: 38%;
        height: 100%;
        background: var(--gs-surface);
        border-left: 1px solid var(--gs-border);
        display: flex;
        flex-direction: column;
        z-index: 200;
        backdrop-filter: blur(20px);
      }

      #next-slide-preview {
        flex: 1;
        padding: 1.5rem 1.8rem;
        border-bottom: 1px solid var(--gs-border);
        overflow: auto;
      }

      #next-slide-preview h3,
      #presenter-notes h3 {
        font-family: var(--gs-font-mono);
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--gs-text-dim);
        margin-bottom: 1rem;
      }

      .preview-content {
        font-size: 0.85rem;
        line-height: 1.5;
        white-space: pre-wrap;
        color: var(--gs-text-muted);
      }

      #presenter-notes {
        flex: 1;
        padding: 1.5rem 1.8rem;
        overflow: auto;
      }

      .notes-content {
        font-size: 0.95rem;
        line-height: 1.7;
        font-weight: 300;
        color: rgba(240, 239, 244, 0.75);
        white-space: pre-wrap;
      }

      /* ========================================================
         Responsive Scaling
         ======================================================== */

      @media (max-width: 768px) {
        .gsap-slide h1 { font-size: 2.2rem; }
        .gsap-slide h2 { font-size: 1.6rem; }
        .gsap-slide p,
        .gsap-slide ul li,
        .gsap-slide ol li { font-size: 1rem; }
        .gsap-slide pre code,
        .gsap-slide .shiki code { font-size: 0.8rem; padding: 1em; }

        body.presenter-mode #slides-container { width: 100%; }
        #presenter-panel { display: none; }
      }

      /* Smooth scrollbar for code */
      .gsap-slide pre::-webkit-scrollbar { height: 4px; }
      .gsap-slide pre::-webkit-scrollbar-track { background: transparent; }
      .gsap-slide pre::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="slides-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
