<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gsap-slides</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #eee;
      }
      #slides-container {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .gsap-slide {
        padding: 2rem;
        font-size: 2rem;
        text-align: center;
        flex-direction: column;
        gap: 1rem;
      }
      .gsap-slide h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="slides-container"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
